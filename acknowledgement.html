<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap CSS-->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>
<style>
    <style>
    body {
        background-color:#f4f4f482;
        font-family: Arial, Helvetica, sans-serif;
        padding: 30px;
    }

    form {
        background-color: white;
        padding: 25px;
        border-radius: 8px;
        width: 400px;
        margin: 0 auto;
        margin-top: 50px;
        margin-bottom: 50px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    textarea {
        height : 120px;
        resize: none;
    }

    .button {
        margin-top: 20px;
        text-align:center;
    }

    button {
        
        font-size: 16px;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .submit-btn {
        background-color: #0c2131;
        color: white;
    }
    .clear-btn {
        background-color: #ccc;
        color: black;
        margin-right: 10px;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>
